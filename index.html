<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Galaxy Love — Ayaa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="galaxy.css" />
</head>
<body>

  <canvas id="scene"></canvas>

  <div class="vignette"></div>

  <div id="orbitLayer" class="orbit-layer"></div>

  <div class="hud" id="hud">
    <p class="eyebrow">sebuah galaksi kecil, berisi</p>
    <h1 class="lover-name" id="loverName"></h1>
  </div>

  <button id="startBtn" class="start-core" aria-label="Buka kejutan">
    <span class="core-ring"></span>
    <span class="core-ring delay1"></span>
    <span class="core-label">PENCET</span>
  </button>

  <!-- ===== intro card: tampil pertama sebelum zoom ke galaksi ===== -->
  <div class="intro-overlay" id="introOverlay">
    <div class="intro-card">
      <span class="intro-heart">♡</span>
      <p class="intro-kicker">LOVE</p>
      <h2 class="intro-title">Galaxy Love</h2>
      <p class="intro-sub">sebuah undangan menuju semesta kecil kita</p>
      <button class="intro-btn" id="introBtn">
        <span>MULAI</span>
        <span class="intro-btn-heart">♡</span>
      </button>
    </div>
  </div>

  <div id="flash" class="supernova-flash"></div>

  <script src="photos.js"></script>
  <script src="data.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="galaxy.js"></script>
</body>
</html>
